<!DOCTYPE html>
<html>
<head>
    <title>Image Repeater</title>
    <style>
        :root {
            --bg: #f6f7f9;
            --panel: #ffffff;
            --text: #1a1a1a;
            --muted: #666;
            --border: #e5e7eb;
            --accent: #3b82f6;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f1115;
                --panel: #171a21;
                --text: #e5e7eb;
                --muted: #9ca3af;
                --border: #2a2f3a;
                --accent: #60a5fa;
            }
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            background: var(--bg);
            color: var(--text);
        }

        .controls {
            width: 300px;
            padding: 24px;
            border-right: 1px solid var(--border);
            background: var(--panel);
            box-sizing: border-box;
        }

        .preview {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* 👈 prevents scroll */
        }

        .preview-grid {
            display: flex;
            gap: 20px;
            width: 100%;
            justify-content: center;
            align-items: center;
        }

        .canvas-box {
            width: 45%;
            height: 90vh;
            max-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border-radius: 12px;
            border: 1px solid var(--border);
            background-color: var(--panel);
        }

        .canvas-box.left canvas {
            max-height: 90vh;
            height: auto;
            width: auto;
        }

        .canvas-box.right canvas {
            width: auto;
            height: auto;
        }

        canvas {
            max-width: 100%;
            width: auto;
            height: auto;
            border: 2px solid var(--border);
            border-radius: 12px;
            display: block;
            canvas {
                transition: opacity 0.15s ease;
            }
        }

        .zoom-wrapper {
            overflow: hidden;
            border-radius: 12px;
        }

        .zoom-wrapper canvas {
            transform-origin: center;
            cursor: zoom-in;
        }

        /* TEXT */
        #status {
            font-size: 14px;
            color: var(--muted);
        }

        /* INPUT */
        input[type="number"] {
            width: 100%;
            padding: 8px 10px;
            margin-top: 6px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            font-size: 14px;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: var(--accent);
        }

        /* SLIDER */
        input[type="range"] {
            width: 100%;
            margin-top: 10px;
        }

        /* BUTTONS */
        button {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text);
            cursor: pointer;
            transition: 0.15s;
        }

        button:hover {
            background: var(--border);
        }

        /* DROP OVERLAY */
        .drop-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            backdrop-filter: blur(6px);
        }

        .drop-overlay.active {
            display: flex;
        }

        @media screen and (max-width: 1000px) {
            .canvas-box.left {
                display: none;
            }
            .canvas-box.right {
                width: 95%;
                margin-left: 24px;
                margin-right: 24px;
            }
        }
    </style>
</head>
<body>

<div class="controls">
    <h3 style="margin-top:0;">Image Repeater</h3>
    <div id="status">Drop an image</div>
    <br>


    <div style="margin-top:15px;">
        <label>Margin (px)</label><br>
        <input type="number" id="margin" value="150"><br><br>
        <input type="range" id="marginSlider" min="0" max="500" value="150" style="width:100%;">
    </div>

    <div style="margin-top:15px;">
        <label>Vertical repeats</label><br>
        <input type="number" id="repeat" value="2" min="1" max="5">
        <input type="range" id="repeatSlider" min="1" max="5" value="2" style="width:100%;">
    </div>

    <button id="download">Download</button>
</div>

<div class="preview-grid">
    <div class="canvas-box left">
        <canvas id="canvas"></canvas>
    </div>

    <div class="canvas-box right zoom-wrapper">
        <div class="canvas-inner">
            <canvas id="canvasRepeat"></canvas>
        </div>
    </div>
</div>

<div class="drop-overlay" id="overlay">
    Drop image anywhere
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const canvasRepeat = document.getElementById('canvasRepeat');
    const ctxRepeat = canvasRepeat.getContext('2d');
    const marginInput = document.getElementById('margin');
    const repeatInput = document.getElementById('repeat');
    const marginSlider = document.getElementById('marginSlider');
    const repeatSlider = document.getElementById('repeatSlider');
    const overlay = document.getElementById('overlay');
    let fileName = 'image';
    const EXPORT_TYPE = 'image/jpeg';
    const EXPORT_EXT = 'jpg';
    const JPEG_QUALITY = 0.92;
    let hasImage = false;
    const DEFAULT_ZOOM = 1;
    const ZOOMED_OUT = 0.5;
    let zoomLevel = DEFAULT_ZOOM;
    const MIN_ZOOM = 1;
    const MAX_ZOOM = 5;

    let img = new Image();
    const zoomWrapper = document.querySelector('.zoom-wrapper');


    marginInput.oninput = processImage;
    repeatInput.oninput = processImage;

    function handleFile(file) {
        if (!file) return;

        if (!file.type.startsWith('image/')) {
            console.log('Not an image');
            return;
        }

        const reader = new FileReader();
        reader.onload = () => {
            img.src = reader.result;
            console.log(reader);
            console.log('Image loaded');
        };
        reader.readAsDataURL(file);
    }

    // --- GLOBAL DRAG EVENTS (robust version) ---

    ['dragenter', 'dragover'].forEach(eventName => {
        window.addEventListener(eventName, e => {
            e.preventDefault();
            overlay.classList.add('active');
        });
    });

    ['dragleave', 'drop'].forEach(eventName => {
        window.addEventListener(eventName, e => {
            e.preventDefault();
        });
    });

    // hide overlay when leaving window
    window.addEventListener('dragleave', e => {
        if (e.clientX === 0 && e.clientY === 0) {
            overlay.classList.remove('active');
        }
    });

    // HANDLE DROP (on window, not overlay)
    window.addEventListener('drop', e => {
        overlay.classList.remove('active');

        const file = e.dataTransfer.files[0];
        fileName = file.name.replace(/\.[^/.]+$/, "");

        fileType = file.type || 'image/png';

        // вытаскиваем расширение из mime
        fileExt = fileType.split('/')[1] || 'jpg';

        if (!file || !file.type.startsWith('image/')) {
            document.getElementById('status').innerText = 'Not an image';
            return;
        }

        document.getElementById('status').innerText = 'Loading...';

        const reader = new FileReader();
        reader.onload = () => {
            img.src = reader.result;
        };
        reader.readAsDataURL(file);
    });

    img.onload = () => {
        hasImage = true;
        document.getElementById('canvas').style.border = 'none';
        document.getElementById('canvasRepeat').style.border = 'none';

        zoomLevel = DEFAULT_ZOOM;

        const canvas = zoomWrapper.querySelector('canvas');
        canvas.style.transform = `scale(${zoomLevel})`;

        document.getElementById('status').innerText = 'Image Loaded';
        processImage();
    };

    // --- PROCESS ---

    function processImage() {
        if (!img.src) return;

        const raw = parseInt(marginInput.value);
        const m = Math.max(0, Math.min(raw || 0, Math.floor(img.height / 2)));
        const w = img.width;
        const h = img.height;
        const newH = h - 2 * m;

        if (m === 0) {
            canvas.width = w;
            canvas.height = h;

            ctx.fillStyle = 'var(--panel)';
            ctx.fillRect(0, 0, w, h);

            ctx.drawImage(img, 0, 0);

            // repeat тоже обновим
            const repeatCount = Math.max(1, parseInt(repeatInput.value) || 1);

            canvasRepeat.width = w;
            canvasRepeat.height = h * repeatCount;

            ctxRepeat.clearRect(0, 0, canvasRepeat.width, canvasRepeat.height);

            for (let i = 0; i < repeatCount; i++) {
                ctxRepeat.drawImage(canvas, 0, i * h);
            }

            return;
        }

        canvas.width = w;
        canvas.height = newH;

        ctx.fillStyle = 'var(--panel)'; // или var(--panel), если хочешь красиво
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.clearRect(0, 0, w, newH);

        // middle
        ctx.drawImage(img, 0, m, w, newH, 0, 0, w, newH);

        const temp = document.createElement('canvas');
        const tctx = temp.getContext('2d');

        temp.width = w;
        temp.height = m;

        // bottom
        tctx.drawImage(img, 0, h - m, w, m, 0, 0, w, m);

        let gradOut = tctx.createLinearGradient(0, 0, 0, m);
        gradOut.addColorStop(0, 'rgba(0,0,0,1)');
        gradOut.addColorStop(1, 'rgba(0,0,0,0)');

        tctx.globalCompositeOperation = 'destination-in';
        tctx.fillStyle = gradOut;
        tctx.fillRect(0, 0, w, m);

        // top
        tctx.globalCompositeOperation = 'source-over';
        tctx.drawImage(img, 0, 0, w, m, 0, 0, w, m);

        let gradIn = tctx.createLinearGradient(0, 0, 0, m);
        gradIn.addColorStop(0, 'rgba(0,0,0,0)');
        gradIn.addColorStop(1, 'rgba(0,0,0,1)');

        tctx.globalCompositeOperation = 'destination-in';
        tctx.fillStyle = gradIn;
        tctx.fillRect(0, 0, w, m);

        ctx.drawImage(temp, 0, newH - m);

        // --- REPEAT PREVIEW ---

        const repeatCount = Math.max(1, parseInt(repeatInput.value) || 1);

        // размеры второго canvas
        canvasRepeat.width = w;
        canvasRepeat.height = newH * repeatCount;

        ctxRepeat.clearRect(0, 0, canvasRepeat.width, canvasRepeat.height);

        // рисуем повторения
        for (let i = 0; i < repeatCount; i++) {
            ctxRepeat.drawImage(canvas, 0, i * newH);
        }

    }


    // --- Download function ---

    const download = () => {
        const link = document.createElement('a');

        link.download = `${fileName}.${EXPORT_EXT}`;
        link.href = canvas.toDataURL(EXPORT_TYPE, JPEG_QUALITY);
        link.click();
    };


    // --- Slider Sync ---

    // slider → input
    marginSlider.oninput = () => {
        marginInput.value = marginSlider.value;
        processImage();
    };

    // input → slider
    marginInput.oninput = () => {
        marginSlider.value = marginInput.value;
        processImage();
    };

    // slider → input
    repeatSlider.oninput = () => {
        repeatInput.value = repeatSlider.value;
        processImage();
    };

    // input → slider
    repeatInput.oninput = () => {
        repeatSlider.value = repeatInput.value;
        processImage();
    };

    // --- Download Button ---

    document.getElementById('download').onclick = () => {
        download()
    };

    // --- Enter Download shortcut ---

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault(); // stop weird form behavior
            processImage();
            download()
        }
    });


    // --- Zoom ---

    zoomWrapper.addEventListener('wheel', (e) => {
        if (!hasImage) return;

        e.preventDefault();

        const delta = -e.deltaY;
        const zoomStep = 0.002;

        zoomLevel += delta * zoomStep;
        zoomLevel = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoomLevel));

        const canvas = zoomWrapper.querySelector('canvas');

        canvas.style.transform = `scale(${zoomLevel}`;
    }, {passive: false});

    zoomWrapper.addEventListener('dblclick', () => {
        const canvas = zoomWrapper.querySelector('canvas');

        if (zoomLevel > 0.9) {
            zoomLevel = ZOOMED_OUT;
        } else {
            zoomLevel = DEFAULT_ZOOM;
        }

        canvas.style.transform = `scale(${zoomLevel})`;
    });





</script>

</body>
</html>
